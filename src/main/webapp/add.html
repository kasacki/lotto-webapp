<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Lotto Draw</title>
</head>
<body>
    <h1>Add New Lotto Draw</h1>
    <p>Please enter the draw data in the following format:</p>
    <code>yyyy-MM-dd;num1,num2,num3,num4,num5,num6</code>
    <br><br>
    
    <form method="post" action="add">
        <label for="draw">Draw Data:</label><br>
        <input type="text" id="draw" name="draw" size="40" placeholder="e.g. 2023-10-25;1,2,3,4,5,6" required>
        <br><br>
        <button type="submit">Save Draw</button>
    </form>
    
    <hr>
    <a href="index.html">Return to Home</a>
</body>
</html>
