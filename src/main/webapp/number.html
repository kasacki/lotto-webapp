<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Check Number Appearance</title>
</head>
<body>
    <h1>Lotto Number Statistics</h1>
    <p>Enter a number to calculate how many days have passed since its last appearance.</p>
    
    <form method="post" action="number">
        <label for="number">Lottery Number:</label>
        <input type="number" id="number" name="number" min="1" max="49" required>
        <button type="submit">Calculate Days</button>
    </form>
    
    <p><i>Note: The system will remember your last search using cookies.</i></p>
    
    <hr>
    <a href="index.html">Return to Home</a>
</body>
</html>
